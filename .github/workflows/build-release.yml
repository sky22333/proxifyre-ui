name: 手动构建并发布

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "发布版本标签 (例如: v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: src
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag_name }}
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装 .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 还原依赖
        run: dotnet restore

      - name: Release 构建
        run: dotnet build -c Release

      - name: 打包发布产物
        shell: pwsh
        run: |
          $outputDir = Join-Path $PWD "bin\Release\net48"
          if (-not (Test-Path $outputDir)) {
            throw "Release output not found: $outputDir"
          }
          $distDir = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item -ItemType Directory -Path $distDir -Force | Out-Null
          $zipPath = Join-Path $distDir "proxifyre-ui.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $outputDir '*') -DestinationPath $zipPath

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: proxifyre-ui
          path: dist/proxifyre-ui.zip

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: dist/proxifyre-ui.zip
